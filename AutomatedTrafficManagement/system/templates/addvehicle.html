<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>
</head>
<body>
    <h1>Register a vehicle</h1>

    <form method="get" action="{% url 'addvehicle' %}">
        <input type="text" name="plate" placeholder="Number Plate" required>
        <input type="text" name="owner" placeholder="Owner Name" required>
        <input type="text" name="type" placeholder="Vehicle Type" required>
        <input type="email" name="email" placeholder="Owner Email" required>
        <button type="submit">Register</button>
    </form>

    <a href="{% url 'home' %}">Back to Home</a>
</body>
</html>
