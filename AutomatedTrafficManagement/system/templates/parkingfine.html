<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Parking Violation</title>
</head>
<body>
    <h1>Register Parking Violation</h1>
    
    <form method="get" action="{% url 'parkingfine' %}">
        <label for="vehicle_plate">Vehicle Plate:</label>
        <input type="text" id="vehicle_plate" name="vehicle_plate" required><br><br>

        <label for="junction_name">Junction Name (Optional):</label>
        <input type="text" id="junction_name" name="junction_name"><br><br>

        <label for="description">Description (Optional):</label>
        <textarea id="description" name="description"></textarea><br><br>

        <button type="submit">Register Violation</button>
        <a href="{% url 'home' %}">Back to Home</a>
    </form>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
</body>
</html>
